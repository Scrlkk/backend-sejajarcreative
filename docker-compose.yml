
services:
  # 1. Database Service (PostgreSQL)
  postgres-db:
    image: postgres:15-alpine
    container_name: sejajar-postgres
    restart: no
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend Service (Express.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sejajar-backend
    restart: no
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy

  # 3. Frontend Service (Vite React)
  frontend:
    build:
      context: ../react-sejajar
      dockerfile: Dockerfile
    container_name: sejajar-frontend
    restart: no
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ../react-sejajar:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
