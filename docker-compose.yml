version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  postgres-db:
    image: postgres:15-alpine
    container_name: sejajar-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: db_sejajar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_sejajar"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend Service (Express.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sejajar-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=db_sejajar
      - DB_USER=postgres
      - DB_PASSWORD=secretpassword
      - JWT_SECRET=0c45a548519ce760dc277d6196cd5a5ad4259cc17b3a3318b2ea5b03cbf1e4d5
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_SECRET=34c616237a333b3306c4777ee2ef6dd571b6065a84f67b7096e74ddc92be397f
      - JWT_REFRESH_EXPIRES_IN=30d
      - BCRYPT_ROUNDS=12
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
      - LOG_LEVEL=info
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=52428800
      - STORAGE_LIMIT_MB=2048
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy

  # 3. Frontend Service (Vite React)
  frontend:
    build:
      context: ../react-sejajar
      dockerfile: Dockerfile
    container_name: sejajar-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ../react-sejajar:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
